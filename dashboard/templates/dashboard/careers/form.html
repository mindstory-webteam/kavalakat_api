{% extends 'dashboard/base.html' %}
{% block topbar_actions %}
  <a href="{% url 'dashboard:careers_list' %}" class="btn btn-secondary">
    <i class="fa-solid fa-arrow-left"></i> Back
  </a>
{% endblock %}
{% block content %}
<div style="max-width:720px;">
  <div class="card">
    <div class="card-header"><span class="card-title">{{ page_title }}</span></div>
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Job Title *</label>
            <input type="text" name="title" class="form-control"
              value="{{ obj.title|default:'' }}" required placeholder="e.g. Sales Executive"/>
          </div>
          <div class="form-group">
            <label class="form-label">Department</label>
            <input type="text" name="department" class="form-control"
              value="{{ obj.department|default:'' }}" placeholder="e.g. Sales & Marketing"/>
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Job Type</label>
            <select name="job_type" class="form-control">
              <option value="Full-Time"  {% if obj.job_type == 'Full-Time' or not obj %}selected{% endif %}>Full-Time</option>
              <option value="Part-Time"  {% if obj.job_type == 'Part-Time' %}selected{% endif %}>Part-Time</option>
              <option value="Contract"   {% if obj.job_type == 'Contract' %}selected{% endif %}>Contract</option>
              <option value="Internship" {% if obj.job_type == 'Internship' %}selected{% endif %}>Internship</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Location</label>
            <input type="text" name="location" class="form-control"
              value="{{ obj.location|default:'' }}" placeholder="e.g. Kochi, Kerala"/>
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Experience</label>
            <input type="text" name="experience" class="form-control"
              value="{{ obj.experience|default:'' }}" placeholder="e.g. 2-5 years"/>
          </div>
          <div class="form-group">
            <label class="form-label">Salary Range</label>
            <input type="text" name="salary_range" class="form-control"
              value="{{ obj.salary_range|default:'' }}" placeholder="e.g. ₹3-5 LPA"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Description *</label>
          <textarea name="description" class="form-control" rows="6"
            required placeholder="Job description and responsibilities…">{{ obj.description|default:'' }}</textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Requirements / Qualifications</label>
          <textarea name="requirements" class="form-control" rows="5"
            placeholder="Required qualifications, skills, education…">{{ obj.requirements|default:'' }}</textarea>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Application Deadline</label>
            <input type="date" name="deadline" class="form-control"
              value="{{ obj.deadline|date:'Y-m-d'|default:'' }}"/>
          </div>
          <div class="form-group" style="display:flex;align-items:center;padding-top:28px;">
            <div class="form-check">
              <input type="checkbox" name="is_active" id="is_active"
                {% if obj.is_active or not obj %}checked{% endif %}/>
              <label for="is_active">Job listing is active (visible on website)</label>
            </div>
          </div>
        </div>
        <div class="flex gap-2" style="margin-top:8px;">
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-floppy-disk"></i>
            {% if obj %}Update Job{% else %}Post Job{% endif %}
          </button>
          {% if obj %}
          <a href="{% url 'dashboard:careers_delete' obj.pk %}" class="btn btn-danger">
            <i class="fa-solid fa-trash"></i> Delete
          </a>
          {% endif %}
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
