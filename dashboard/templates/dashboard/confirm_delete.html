{% extends 'dashboard/base.html' %}
{% block content %}
<div style="max-width:480px;margin:60px auto;">
  <div class="card" style="border-color:rgba(239,68,68,.3);">
    <div class="card-body" style="text-align:center;padding:48px 32px;">
      <div style="font-size:56px;color:#ef4444;margin-bottom:20px;opacity:.8;">
        <i class="fa-solid fa-triangle-exclamation"></i>
      </div>
      <h2 style="font-family:var(--font-head);font-size:20px;font-weight:700;margin-bottom:10px;">
        Confirm Deletion
      </h2>
      <p style="color:var(--muted);font-size:14px;margin-bottom:28px;line-height:1.6;">
        Are you sure you want to delete <strong style="color:var(--text);">{{ obj }}</strong>?
        <br>This action cannot be undone.
      </p>
      <div style="display:flex;gap:12px;justify-content:center;">
        <a href="javascript:history.back()" class="btn btn-secondary">
          <i class="fa-solid fa-arrow-left"></i> Cancel
        </a>
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">
            <i class="fa-solid fa-trash"></i> Yes, Delete
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
