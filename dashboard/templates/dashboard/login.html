<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login — Kavalakat CMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',sans-serif;
  background:#0a0c10;
  color:#e8eaf0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
.bg-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(1,96,178,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(1,96,178,.04) 1px,transparent 1px);
  background-size:48px 48px;
}
.bg-glow{
  position:absolute;
  width:600px;height:600px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(1,96,178,.1) 0%,transparent 70%);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
}
.login-card{
  position:relative;z-index:1;
  width:100%;max-width:400px;
  background:#0f1218;
  border:1px solid #1e2535;
  border-radius:20px;
  padding:44px 38px;
  box-shadow:0 24px 60px rgba(0,0,0,.6);
}
.logo-wrap{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:28px;
}
.logo-icon{
  width:44px;height:44px;flex-shrink:0;
}
.logo-name{
  font-family:'Syne',sans-serif;
  font-size:22px;font-weight:800;
  {% comment %} color:#0160b2; {% endcomment %}
  letter-spacing:.5px;
  line-height:1;
}
.logo-sub{
  font-size:10px;text-transform:uppercase;
  letter-spacing:2px;
  {% comment %} color:#4b5563; {% endcomment %}
  margin-top:3px;
}
.page-title{
  font-family:'Syne',sans-serif;
  font-size:20px;font-weight:700;
  color:#e8eaf0;
  margin-bottom:6px;
}
.page-sub{
  font-size:13px;color:#6b7280;
  margin-bottom:28px;
}
.form-label{
  display:block;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.8px;
  color:#6b7280;margin-bottom:7px;
}
.form-control{
  width:100%;
  background:#161b24;
  border:1px solid #1e2535;
  border-radius:10px;
  padding:12px 16px;
  color:#e8eaf0;
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  margin-bottom:18px;
  transition:border-color .15s;
}
.form-control:focus{outline:none;border-color:#0160b2;}
.btn-login{
  width:100%;
  background:#0160b2;
  color:#fff;
  border:none;
  border-radius:10px;
  padding:13px;
  font-family:'Syne',sans-serif;
  font-size:15px;font-weight:700;
  cursor:pointer;
  letter-spacing:.3px;
  transition:background .15s;
  margin-top:4px;
}
.btn-login:hover{background:#0472d0;}
.error-msg{
  background:rgba(239,68,68,.1);
  border:1px solid rgba(239,68,68,.25);
  color:#ef4444;
  padding:10px 14px;
  border-radius:8px;
  font-size:13px;
  margin-bottom:18px;
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="login-card">

  <!-- Logo -->
  <div class="logo-wrap">
    <svg class="logo-icon" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="3" width="54" height="54" rx="4" stroke="#0160b2" stroke-width="3" fill="none"/>
      <rect x="8" y="8" width="44" height="44" rx="2" stroke="#0160b2" stroke-width="1.5" fill="none" opacity="0.4"/>
      <path d="M18 14 L18 46" stroke="#0160b2" stroke-width="4" stroke-linecap="round"/>
      <path d="M18 30 L38 14" stroke="#0160b2" stroke-width="4" stroke-linecap="round"/>
      <path d="M18 30 L38 46" stroke="#0160b2" stroke-width="4" stroke-linecap="round"/>
      <path d="M26 22 L32 30 L26 38" stroke="#0f1218" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div>
      <div class="logo-name">Kavalakat</div>
      <div class="logo-sub">Content Management</div>
    </div>
  </div>

  <div class="page-title">Welcome back</div>
  <div class="page-sub">Sign in to manage your content</div>

  {% for message in messages %}
    <div class="error-msg">{{ message }}</div>
  {% endfor %}

  <form method="post">
    {% csrf_token %}
    <label class="form-label">Username</label>
    <input type="text" name="username" class="form-control" placeholder="Enter username" autofocus/>
    <label class="form-label">Password</label>
    <input type="password" name="password" class="form-control" placeholder="Enter password"/>
    <button type="submit" class="btn-login">Sign In &rarr;</button>
  </form>

</div>
</body>
</html>
