{% extends 'dashboard/base.html' %}
{% block topbar_actions %}
  <a href="{% url 'dashboard:pages_list' %}" class="btn btn-secondary"><i class="fa-solid fa-arrow-left"></i> Back</a>
{% endblock %}
{% block content %}
<div style="max-width:760px;">
<form method="post" enctype="multipart/form-data">{% csrf_token %}
<div style="display:flex;flex-direction:column;gap:16px;">
  <div class="card">
    <div class="card-header"><span class="card-title">Page Content</span></div>
    <div class="card-body">
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input type="text" name="title" class="form-control" value="{{ obj.title|default:'' }}" required placeholder="Page title"/>
      </div>
      <div class="form-group">
        <label class="form-label">Content</label>
        <textarea name="content" class="form-control" rows="12" placeholder="Page content (HTML or Markdown)">{{ obj.content|default:'' }}</textarea>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Meta Title</label>
          <input type="text" name="meta_title" class="form-control" value="{{ obj.meta_title|default:'' }}" placeholder="SEO title"/>
        </div>
        <div class="form-group">
          <label class="form-label">Order</label>
          <input type="number" name="order" class="form-control" value="{{ obj.order|default:0 }}"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Meta Description</label>
        <textarea name="meta_description" class="form-control" rows="2" placeholder="SEO description">{{ obj.meta_description|default:'' }}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Banner Image</label>
        {% if obj.banner_image %}<img src="{{ obj.banner_image.url }}" style="width:100%;border-radius:8px;margin-bottom:10px;"/>{% endif %}
        <input type="file" name="banner_image" class="form-control" accept="image/*"/>
      </div>
      <div class="form-check">
        <input type="checkbox" name="is_active" id="is_active" {% if obj.is_active or not obj %}checked{% endif %}/>
        <label for="is_active">Active (visible on website)</label>
      </div>
    </div>
  </div>
  <div class="flex gap-2">
    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> {% if obj %}Update{% else %}Create{% endif %} Page</button>
    {% if obj %}<a href="{% url 'dashboard:pages_delete' obj.pk %}" class="btn btn-danger"><i class="fa-solid fa-trash"></i> Delete</a>{% endif %}
  </div>
</div>
</form>
</div>
{% endblock %}
