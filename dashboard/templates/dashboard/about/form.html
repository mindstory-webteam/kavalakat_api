{% extends 'dashboard/base.html' %}
{% block content %}
<div style="max-width:760px;">
  <form method="post">
    {% csrf_token %}
    <div style="display:flex;flex-direction:column;gap:16px;">
      <div class="card">
        <div class="card-header"><span class="card-title">🏢 Company Information</span></div>
        <div class="card-body">
          <div class="form-group">
            <label class="form-label">Company Title / Tagline *</label>
            <input type="text" name="title" class="form-control"
              value="{{ obj.title|default:'' }}" required placeholder="e.g. Kavalakat – Your Trusted Cement Partner"/>
          </div>
          <div class="form-group">
            <label class="form-label">Main Description</label>
            <textarea name="description" class="form-control" rows="6"
              placeholder="Main about us description…">{{ obj.description|default:'' }}</textarea>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Founded Year</label>
              <input type="number" name="founded_year" class="form-control"
                value="{{ obj.founded_year|default:'' }}" placeholder="e.g. 2005" min="1900" max="2100"/>
            </div>
            <div class="form-group">
              <label class="form-label">Employee Count</label>
              <input type="number" name="employee_count" class="form-control"
                value="{{ obj.employee_count|default:'' }}" placeholder="e.g. 50"/>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">🎯 Vision & Mission</span></div>
        <div class="card-body">
          <div class="form-group">
            <label class="form-label">Vision Statement</label>
            <textarea name="vision" class="form-control" rows="4"
              placeholder="Our long-term vision…">{{ obj.vision|default:'' }}</textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Mission Statement</label>
            <textarea name="mission" class="form-control" rows="4"
              placeholder="Our day-to-day mission…">{{ obj.mission|default:'' }}</textarea>
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" style="padding:13px 24px;">
        <i class="fa-solid fa-floppy-disk"></i> Save About Info
      </button>
    </div>
  </form>
</div>
{% endblock %}
